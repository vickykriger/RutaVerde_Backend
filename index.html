<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta Verde - Autenticación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1b5e20;
        }
        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registrarse</h2>
        <form id="registro-form">
            <div class="input-group">
                <label for="regNombre">Nombre Completo</label>
                <input type="text" id="regNombre" required>
            </div>
            <div class="input-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="input-group">
                <label for="regPassword">Contraseña</label>
                <input type="password" id="regPassword" required>
            </div>
            <button type="submit">Crear Cuenta</button>
        </form>
        <div id="registro-mensaje" class="message"></div>
    </div>

    <div class="form-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="log-email">Email</label>
                <input type="email" id="log-email" required>
            </div>
            <div class="input-group">
                <label for="log-password">Contraseña</label>
                <input type="password" id="log-password" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>
        <div id="login-mensaje" class="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>src="index.js"</script>
</body>
</html>
